[workspace]
members = ["cargo:rust"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Run the crates.io publish as a cargo-dist publish job, so it fires only after
# every target binary has built. See .github/workflows/publish-crates.yml for why
# the ordering matters (irreversible publish vs. re-runnable build).
publish-jobs = ["./publish-crates", "./release-opencode-plugin"]
# Publish prereleases to crates.io rather than skipping them — otherwise the publish
# wiring is never exercised until a real, irreversible release. Cost is a permanently
# claimed prerelease version; cargo won't resolve one unless a range opts in.
publish-prereleases = true
# The installers to generate for each app.
# `shell` is load-bearing, not cosmetic: it publishes the hosted installer script
# that the Claude/OpenCode plugin shims curl when no sharedserver is on PATH, so a
# plugin install needs no Rust toolchain. Dropping it silently breaks that fallback.
installers = ["shell"]
# Target platforms (Rust target-triple syntax). No Windows: `nix` is `#![cfg(unix)]`,
# so there it compiles to an empty crate and our own code loses its imports — 9 errors
# across core/{lockfile,log,health}.rs under `cargo check --target
# x86_64-pc-windows-msvc`. That is a port behind a platform/ abstraction, not a config
# entry, and adding it here would block the whole release rather than skip an artifact.
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]
