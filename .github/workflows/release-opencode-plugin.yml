name: Release (opencode-sharedserver)

# Publishes the @geohar/opencode-sharedserver npm plugin on the unified release tag
# (v*), in lockstep with the whole repo — one vX.Y.Z tag releases the rust crate,
# the Claude Code plugin, and this npm package together. Release: bump every manifest
# with scripts/bump-version.sh <version>, then push the vX.Y.Z tag:
#
#   scripts/bump-version.sh <version> && git push && git push origin v<version>
#
# Mirrors the repo's other release workflows: tag-triggered, trusted publishing
# (OIDC, no secrets), an environment gate. npm equivalent of PyPI/crate Trusted
# Publishing:
#
#   One-time setup at https://www.npmjs.com/ → the package → Settings → Trusted
#   Publisher, with:
#       repository:   georgeharker/sharedserver
#       workflow:     release-opencode-plugin.yml
#       environment:  npm
#   Then create a GitHub environment named "npm" (repo Settings → Environments).
#
# No NPM_TOKEN needed once the trusted publisher is configured.
#
# Invoked by cargo-dist's release.yml as a publish job, not on its own tag trigger, so
# it runs only after every target binary has built — this package's resolver downloads
# those binaries, so publishing it before they exist ships a plugin pointing at a 404.
#
# Do NOT rename this file: npm's trusted publisher is bound to it by name.

on:
  workflow_call:
    inputs:
      plan:
        # Unused, but cargo-dist passes it to every publish job and an undeclared
        # input invalidates the workflow.
        description: cargo-dist release plan (JSON)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    # No job-level `permissions:` — as a called workflow it inherits what release.yml
    # grants publish jobs (id-token: write, packages: write). Declaring any permission
    # the caller did not grant, such as the `contents: read` this used to carry, can
    # only narrow, never widen, and fails the whole run at startup.
    defaults:
      run:
        working-directory: plugins/opencode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # NB: no registry-url — it writes an .npmrc expecting NODE_AUTH_TOKEN,
          # which shadows OIDC trusted publishing and makes `npm publish` 404.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Verify tag matches package version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag …-v$tag does not match plugin version $pkg — bump plugins/opencode/package.json"
            exit 1
          fi
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: Publish to npm (trusted publishing + provenance)
        # npm rejects a prerelease published without an explicit --tag, since the
        # default dist-tag is `latest`. Send prereleases to `next` so `latest` stays
        # stable.
        run: |
          ver="$(node -p "require('./package.json').version")"
          if [ "${ver#*-}" != "$ver" ]; then
            echo "publishing prerelease $ver under dist-tag 'next'"
            npm publish --provenance --access public --tag next
          else
            npm publish --provenance --access public
          fi
