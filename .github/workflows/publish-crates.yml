name: Publish to crates.io
#
# Invoked by cargo-dist's release.yml as a publish job (`publish-jobs` in
# dist-workspace.toml), so it runs only after every target binary has built.
#
# Do NOT add a `push: tags:` trigger. It used to have one, which raced the build: a
# publish is irreversible (yank, never unpublish) while a build failure is a re-run,
# so the bad outcome was a published crate whose installer URL 404s — the URL the
# plugin shims curl on every session start.

on:
  workflow_call:
    inputs:
      plan:
        # Unused, but cargo-dist passes it to every publish job and an undeclared
        # input invalidates the workflow — which only shows up during a release.
        description: cargo-dist release plan (JSON)
        required: true
        type: string
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: crates.io publish token
        required: true

jobs:
  publish:
    name: Publish sharedserver
    runs-on: ubuntu-latest
    environment: crates
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish to crates.io
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          path: ./rust
