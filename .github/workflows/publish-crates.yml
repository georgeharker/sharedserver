name: Publish to crates.io
#
# Invoked by cargo-dist's release.yml as a publish job (`publish-jobs` in
# dist-workspace.toml), so it runs only after every target binary has built.
#
# Do NOT add a `push: tags:` trigger. It used to have one, which raced the build: a
# publish is irreversible (yank, never unpublish) while a build failure is a re-run,
# so the bad outcome was a published crate whose installer URL 404s — the URL the
# plugin shims curl on every session start.

on:
  workflow_call:
    inputs:
      plan:
        # Unused, but cargo-dist passes it to every publish job and an undeclared
        # input invalidates the workflow — which only shows up during a release.
        description: cargo-dist release plan (JSON)
        required: true
        type: string

jobs:
  publish:
    name: Publish sharedserver
    runs-on: ubuntu-latest
    environment: crates
    # No `permissions:` — a called workflow can only narrow the caller's grant, and
    # release.yml already gives publish jobs id-token: write (what OIDC needs).
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Trusted publishing: exchange the GitHub OIDC token for a 30-minute crates.io
      # token, so no long-lived CARGO_REGISTRY_TOKEN secret exists to leak.
      #
      # crates.io matches its trusted-publisher config against the `workflow_ref`
      # claim (crates_io_trustpub/src/github/claims.rs), which for a called workflow is
      # the TOP-LEVEL caller. So the publisher must be registered as `release.yml`, not
      # this file — same as npm.
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish --manifest-path rust/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
